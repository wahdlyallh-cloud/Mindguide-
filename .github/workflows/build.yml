name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # حقن مفتاح جينيرال السري بأمان داخل ملفات البيئة
    - name: Inject Gemini API Key
      run: |
        echo "MAIN_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

    # خطوة تثبيت نسخة Gradle 8.7 المستقرة مباشرة على السيرفر لتخطي أي تعارض في النسخ
    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    # بناء التطبيق مباشرة بالنسخة المثبتة النظيفة وتوليد الـ APK
    - name: Build Android APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-gemini-app
        path: app/build/outputs/apk/debug/app-debug.apk
        
