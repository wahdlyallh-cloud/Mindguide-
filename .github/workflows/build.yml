name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # حقن مفتاح جينيرال السري بأمان داخل ملفات البيئة
    - name: Inject Gemini API Key
      run: |
        echo "MAIN_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

    # توليد ملف المفتاح تلقائياً في ثوانٍ لتخطي مشكلة الـ Keystore المفقود
    - name: Generate Missing Debug Keystore
      run: |
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    # تثبيت نسخة Gradle 9.3.1 المستقرة مباشرة على السيرفر
    - name: Setup Gradle 9.3.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    # بناء التطبيق مباشرة باستخدام النسخة المثبتة
    - name: Build Android APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-gemini-app
        path: app/build/outputs/apk/debug/app-debug.apk
        
